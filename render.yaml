# render.yaml - Arquivo de configuração de Blueprint para o deploy automático no Render.
# Este arquivo define o serviço web rodando via Docker e as variáveis de ambiente necessárias.

services:
  - type: web
    name: mcdmarketprime
    # Define o ambiente como docker para utilizar o Dockerfile do projeto
    env: docker
    # Usa o plano free (gratuito) do Render
    plan: free
    # Com docker, o build e o start são gerenciados pelo Dockerfile automaticamente
    buildCommand: ""
    startCommand: ""
    # Variáveis de ambiente que serão solicitadas ao usuário no momento do deploy
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
